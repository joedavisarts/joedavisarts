<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Joe Davis Arts & Media</title>
  <script>(function(){ document.documentElement.setAttribute('data-theme','dark'); })();</script>
  <link rel="icon" type="image/png" href="assets/images/Logo_Head_Gold_Icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #0D0D0B; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; }
    .wrap-404 { max-width: 540px; }
    .num-404 { font-family: var(--font-heading); font-size: clamp(120px, 20vw, 200px); line-height: 0.85; color: rgba(218,179,34,0.12); letter-spacing: 0.02em; margin-bottom: 0; }
    .icon-404 { font-size: 48px; margin-bottom: 16px; display: block; }
    .title-404 { font-family: var(--font-heading); font-size: clamp(32px, 5vw, 52px); color: #F0EDE6; letter-spacing: 0.02em; margin-bottom: 16px; line-height: 0.9; }
    .sub-404 { font-size: 15px; color: rgba(250,250,248,0.45); line-height: 1.75; margin-bottom: 36px; }
    .links-404 { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-404 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 600; padding: 12px 24px; border-radius: 8px; text-decoration: none; transition: all 0.2s; }
    .btn-404.primary { background: var(--gold); color: #0D0D0B; }
    .btn-404.primary:hover { background: #c9a420; }
    .btn-404.secondary { border: 1px solid rgba(255,255,255,0.12); color: rgba(250,250,248,0.6); }
    .btn-404.secondary:hover { border-color: rgba(218,179,34,0.4); color: var(--gold); }
    .divider-404 { width: 40px; height: 2px; background: var(--gold); margin: 24px auto; }
  </style>
</head>
<body>
  <div class="wrap-404">
    <div class="num-404">404</div>
    <span class="icon-404">🎹</span>
    <h1 class="title-404">WRONG NOTE.<br>WRONG PAGE.</h1>
    <div class="divider-404"></div>
    <p class="sub-404">That page doesn't exist — but the good news is everything else does. Head back and find what you were looking for.</p>
    <div class="links-404">
      <a href="index.html" class="btn-404 primary">Back to Home</a>
      <a href="portfolio.html" class="btn-404 secondary">View Portfolio</a>
      <a href="contact.html" class="btn-404 secondary">Get in Touch</a>
    </div>
  </div>
</body>
</html>
