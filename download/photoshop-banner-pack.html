<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photoshop Banner Pack — Joe Davis Arts & Media</title>
  <script>(function(){ var t=localStorage.getItem('jdam-theme')||'light'; document.documentElement.setAttribute('data-theme',t); })();</script>
  <link rel="icon" type="image/png" href="../assets/images/Logo_Head_Gold_Icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .dl-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: var(--bg-primary);
    }
    .dl-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 52px 48px;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    }
    .dl-icon {
      font-size: 52px;
      margin-bottom: 20px;
      display: block;
    }
    .dl-tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }
    .dl-title {
      font-family: var(--font-heading);
      font-size: 36px;
      letter-spacing: 0.02em;
      color: var(--heading-color);
      margin-bottom: 16px;
      line-height: 1.05;
    }
    .dl-desc {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.75;
      margin-bottom: 36px;
    }
    .dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'Plus Jakarta Sans', Arial, sans-serif;
      font-size: 15px;
      font-weight: 600;
      background: #1a1a1a;
      color: #DAB322;
      border: none;
      border-radius: 10px;
      padding: 16px 36px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      margin-bottom: 20px;
    }
    [data-theme="dark"] .dl-btn {
      background: #DAB322;
      color: #0D0D0B;
    }
    .dl-btn:hover { opacity: 0.9; transform: scale(1.02); }
    .dl-note {
      font-size: 12px;
      color: var(--text-muted);
      opacity: 0.6;
      margin-bottom: 32px;
    }
    .dl-divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }
    .dl-footer {
      font-size: 13px;
      color: var(--text-muted);
    }
    .dl-footer a {
      color: var(--gold);
      text-decoration: none;
    }
    .dl-check {
      width: 56px;
      height: 56px;
      background: rgba(76,175,80,0.12);
      border: 1px solid rgba(76,175,80,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 24px;
    }
  </style>
</head>
<body>
<div class="dl-page">
  <div class="dl-card">
    <div class="dl-check">✓</div>
    <div class="dl-tag">Template · Photoshop</div>
    <div class="dl-title">Photoshop Banner Pack</div>
    <p class="dl-desc">Your Photoshop Banner Pack is ready to download. Extract the zip and open the .psd file in Photoshop to get started.</p>
    <a href="https://drive.google.com/uc?export=download&id=1R_6k0dwlsfzQvuJomu_hTvXVzqKOvDVN" class="dl-btn" target="_blank">
      ⬇ Download now
    </a>
    <div class="dl-note">Opens Google Drive. Your download will start automatically.</div>
    <div class="dl-divider"></div>
    <div class="dl-footer">
      Questions? Email <a href="mailto:contact@joedavisarts.com">contact@joedavisarts.com</a><br>
      <a href="../store.html" style="margin-top:8px; display:inline-block;">← Back to store</a>
    </div>
  </div>
</div>
<script src="../js/main.js"></script>
</body>
</html>
