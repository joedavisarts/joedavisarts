<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Read — The Crowned Confidence Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #cab84c;
      --ui-bg: #1a1a1a;
      --ui-border: rgba(255,255,255,0.08);
    }

    html, body {
      height: 100%;
      background: #111;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #fff;
      overflow: hidden;
    }

    /* TOP BAR */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 52px;
      background: #1a1a1a;
      border-bottom: 0.5px solid var(--ui-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      gap: 1rem;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .topbar-logo {
      height: 24px;
      filter: brightness(0) invert(1);
      opacity: 0.6;
    }

    .topbar-divider {
      width: 0.5px;
      height: 18px;
      background: var(--ui-border);
    }

    .topbar-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-style: italic;
      color: rgba(255,255,255,0.4);
      white-space: nowrap;
    }

    .topbar-center {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex: 1;
      justify-content: center;
    }

    .nav-btn {
      background: none;
      border: 0.5px solid var(--ui-border);
      color: rgba(255,255,255,0.6);
      width: 30px;
      height: 30px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }

    .nav-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.06);
      color: #fff;
    }

    .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    .page-input {
      background: rgba(255,255,255,0.06);
      border: 0.5px solid var(--ui-border);
      color: rgba(255,255,255,0.8);
      width: 40px;
      height: 28px;
      border-radius: 2px;
      text-align: center;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      outline: none;
      -moz-appearance: textfield;
    }

    .page-input::-webkit-outer-spin-button,
    .page-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .page-input:focus { border-color: rgba(202,184,76,0.5); }

    .page-total {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    .spread-toggle {
      background: none;
      border: 0.5px solid rgba(202,184,76,0.3);
      color: var(--gold);
      padding: 0 10px;
      height: 28px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .spread-toggle:hover { background: rgba(202,184,76,0.08); }

    .sign-out-btn {
      background: none;
      border: 0.5px solid var(--ui-border);
      color: rgba(255,255,255,0.4);
      padding: 0 10px;
      height: 28px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }

    .sign-out-btn:hover { color: #fff; border-color: rgba(255,255,255,0.2); }

    /* READER */
    .reader {
      position: fixed;
      top: 52px; left: 0; right: 0; bottom: 0;
      overflow-y: auto;
      overflow-x: hidden;
      background: #111;
      scroll-behavior: smooth;
    }

    .reader::-webkit-scrollbar { width: 4px; }
    .reader::-webkit-scrollbar-track { background: transparent; }
    .reader::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .pages-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      gap: 4px;
    }

    /* SINGLE MODE */
    .page-row {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: center;
      gap: 4px;
    }

    .page-row.solo {
      max-width: 600px;
    }

    .page-img-wrap {
      flex: 1;
      position: relative;
      background: #1a1a1a;
      min-height: 100px;
    }

    .page-img-wrap.solo { max-width: 600px; }

    .page-img {
      width: 100%;
      height: auto;
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-user-drag: none;
    }

    /* placeholder while loading */
    .page-img-wrap::before {
      content: '';
      display: block;
      padding-top: 129%; /* approx letter ratio */
      background: #1e1e1e;
    }

    .page-img-wrap.loaded::before { display: none; }

    .page-img-wrap img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .page-img-wrap.loaded img {
      position: static;
      height: auto;
    }

    /* SINGLE SCROLL MODE */
    .pages-container.single-mode .page-row {
      max-width: 600px;
    }

    .pages-container.single-mode .page-row.spread {
      flex-direction: column;
      gap: 4px;
    }

    /* LOADING */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      z-index: 200;
      transition: opacity 0.4s ease;
    }

    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .loading-logo {
      height: 36px;
      filter: brightness(0) invert(1);
      opacity: 0.5;
    }

    .loading-bar-wrap {
      width: 180px;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .loading-text {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1px;
    }

    .loading-note {
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      font-weight: 300;
      text-align: center;
      max-width: 260px;
      line-height: 1.7;
    }

    /* PRINT BLOCK */
    @media print {
      body { display: none !important; }
    }

    img {
      -webkit-user-drag: none;
      user-drag: none;
    }

    @media (max-width: 600px) {
      .topbar-title, .topbar-divider { display: none; }
      .pages-container { padding: 1rem 0.5rem 4rem; }
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <img src="/tccg/logo.png" alt="TCCG" class="loading-logo"/>
  <div class="loading-bar-wrap">
    <div class="loading-bar" id="loadingBar"></div>
  </div>
  <p class="loading-text" id="loadingText">loading your guide...</p>
  <p class="loading-note">best experienced on a laptop or tablet.<br/>image quality may be reduced on phones.</p>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <img src="/tccg/logo.png" alt="TCCG" class="topbar-logo"/>
    <div class="topbar-divider"></div>
    <span class="topbar-title">The Crowned Confidence Guide</span>
  </div>

  <div class="topbar-center">
    <button class="nav-btn" id="firstBtn">«</button>
    <button class="nav-btn" id="prevBtn">‹</button>
    <input class="page-input" type="number" id="pageInput" min="1" value="1"/>
    <span class="page-total" id="pageTotal">/ —</span>
    <button class="nav-btn" id="nextBtn">›</button>
    <button class="nav-btn" id="lastBtn">»</button>
  </div>

  <div class="topbar-right">
    <button class="spread-toggle" id="spreadToggle">⊞ spread</button>
    <button class="sign-out-btn" id="signOutBtn">sign out</button>
  </div>
</div>

<!-- READER -->
<div class="reader" id="reader">
  <div class="pages-container" id="pagesContainer"></div>
</div>

<script>
  // Disable right click and print shortcuts
  document.addEventListener('contextmenu', e => e.preventDefault())
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && ['s','p','u'].includes(e.key.toLowerCase())) e.preventDefault()
  })

  const TOTAL_PAGES = 72
  let spreadMode = true
  let signedUrls = []
  let currentView = 1 // current "view" index (spread or single)
  let views = [] // array of {pages: [n]} or {pages: [n, m]}

  const reader = document.getElementById('reader')
  const pagesContainer = document.getElementById('pagesContainer')
  const pageInput = document.getElementById('pageInput')
  const pageTotal = document.getElementById('pageTotal')

  function buildViews() {
    views = []
    if (spreadMode) {
      // page 1 = cover (solo)
      views.push({ pages: [1], solo: true })
      // pages 2-71 in pairs
      for (let i = 2; i <= TOTAL_PAGES - 1; i += 2) {
        const right = i + 1 <= TOTAL_PAGES - 1 ? i + 1 : null
        views.push({ pages: right ? [i, right] : [i], solo: !right })
      }
      // page 72 = back cover (solo)
      views.push({ pages: [TOTAL_PAGES], solo: true })
    } else {
      for (let i = 1; i <= TOTAL_PAGES; i++) {
        views.push({ pages: [i], solo: true })
      }
    }
    pageTotal.textContent = '/ ' + views.length
    pageInput.max = views.length
  }

  function pageUrl(n) {
    const padded = String(n).padStart(2, '0')
    return signedUrls[padded] || ''
  }

  function buildDOM() {
    pagesContainer.innerHTML = ''
    pagesContainer.className = 'pages-container' + (spreadMode ? '' : ' single-mode')

    views.forEach((view, idx) => {
      const row = document.createElement('div')
      row.className = 'page-row' + (view.solo ? ' solo' : ' spread')
      row.id = 'view-' + (idx + 1)
      row.dataset.viewIndex = idx + 1

      view.pages.forEach(pageNum => {
        const wrap = document.createElement('div')
        wrap.className = 'page-img-wrap' + (view.solo ? ' solo' : '')
        wrap.dataset.page = pageNum

        const img = document.createElement('img')
        img.alt = 'Page ' + pageNum
        img.className = 'page-img'
        img.dataset.src = pageUrl(pageNum)

        wrap.appendChild(img)
        row.appendChild(wrap)
      })

      pagesContainer.appendChild(row)
    })

    setupLazyLoad()
    updateNavUI()
  }

  function setupLazyLoad() {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const wrap = entry.target
          const img = wrap.querySelector('img')
          if (img && img.dataset.src && !img.src) {
            img.src = img.dataset.src
            img.onload = () => wrap.classList.add('loaded')
          }
          // preload next 2 views
          const viewIdx = parseInt(wrap.closest('.page-row')?.dataset.viewIndex || 0)
          preloadAhead(viewIdx, 2)
          observer.unobserve(wrap)
        }
      })
    }, { rootMargin: '200px' })

    document.querySelectorAll('.page-img-wrap').forEach(wrap => observer.observe(wrap))
  }

  function preloadAhead(fromViewIdx, count) {
    for (let i = fromViewIdx + 1; i <= Math.min(fromViewIdx + count, views.length); i++) {
      const row = document.getElementById('view-' + i)
      if (!row) continue
      row.querySelectorAll('.page-img-wrap').forEach(wrap => {
        const img = wrap.querySelector('img')
        if (img && img.dataset.src && !img.src) {
          img.src = img.dataset.src
          img.onload = () => wrap.classList.add('loaded')
        }
      })
    }
  }

  function scrollToView(idx) {
    const el = document.getElementById('view-' + idx)
    if (!el) return
    const readerTop = reader.getBoundingClientRect().top
    const elTop = el.getBoundingClientRect().top
    reader.scrollBy({ top: elTop - readerTop - 16, behavior: 'smooth' })
    currentView = idx
    updateNavUI()
  }

  function updateNavUI() {
    pageInput.value = currentView
    document.getElementById('firstBtn').disabled = currentView <= 1
    document.getElementById('prevBtn').disabled = currentView <= 1
    document.getElementById('nextBtn').disabled = currentView >= views.length
    document.getElementById('lastBtn').disabled = currentView >= views.length
    document.getElementById('spreadToggle').textContent = spreadMode ? '⊞ spread' : '▭ single'
  }

  // Track current view on scroll
  const scrollObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const idx = parseInt(entry.target.dataset.viewIndex)
        if (idx && idx !== currentView) {
          currentView = idx
          pageInput.value = idx
          updateNavUI()
        }
      }
    })
  }, { root: reader, threshold: 0.5 })

  function attachScrollObserver() {
    document.querySelectorAll('.page-row').forEach(row => scrollObserver.observe(row))
  }

  // Controls
  document.getElementById('prevBtn').addEventListener('click', () => scrollToView(Math.max(1, currentView - 1)))
  document.getElementById('nextBtn').addEventListener('click', () => scrollToView(Math.min(views.length, currentView + 1)))
  document.getElementById('firstBtn').addEventListener('click', () => scrollToView(1))
  document.getElementById('lastBtn').addEventListener('click', () => scrollToView(views.length))

  pageInput.addEventListener('change', () => {
    const v = Math.max(1, Math.min(views.length, parseInt(pageInput.value) || 1))
    scrollToView(v)
  })

  pageInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const v = Math.max(1, Math.min(views.length, parseInt(pageInput.value) || 1))
      scrollToView(v)
    }
  })

  document.getElementById('spreadToggle').addEventListener('click', () => {
    spreadMode = !spreadMode
    buildViews()
    buildDOM()
    attachScrollObserver()
    scrollToView(1)
  })

  document.addEventListener('keydown', e => {
    if (document.activeElement === pageInput) return
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') scrollToView(Math.min(views.length, currentView + 1))
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') scrollToView(Math.max(1, currentView - 1))
  })

  document.getElementById('signOutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' })
    window.location.href = '/tccg/login'
  })

  // Load
  async function init() {
    try {
      const res = await fetch('/api/reader/urls', { credentials: 'include' })
      if (!res.ok) { window.location.href = '/tccg/login'; return }

      document.getElementById('loadingBar').style.width = '50%'
      document.getElementById('loadingText').textContent = 'preparing your guide...'

      signedUrls = await res.json()

      document.getElementById('loadingBar').style.width = '80%'

      buildViews()
      buildDOM()
      attachScrollObserver()

      // preload first 3 views immediately
      preloadAhead(0, 3)

      document.getElementById('loadingBar').style.width = '100%'

      setTimeout(() => document.getElementById('loadingOverlay').classList.add('hidden'), 400)

    } catch (err) {
      console.error(err)
      document.getElementById('loadingText').textContent = 'something went wrong. please refresh.'
    }
  }

  init()

  // Silent URL refresh every 55 minutes
  setInterval(async () => {
    try {
      const res = await fetch('/api/reader/urls', { credentials: 'include' })
      if (!res.ok) return
      const freshUrls = await res.json()
      signedUrls = freshUrls
      // Update src on any unloaded images silently
      document.querySelectorAll('.page-img-wrap:not(.loaded) img').forEach(img => {
        const pageNum = img.closest('.page-img-wrap')?.dataset.page
        if (pageNum) {
          const padded = String(pageNum).padStart(2, '0')
          img.dataset.src = signedUrls[padded] || img.dataset.src
        }
      })
    } catch (err) {
      // fail silently
    }
  }, 55 * 60 * 1000)
</script>
</body>
</html>
