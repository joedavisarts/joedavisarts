<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Read — The Crowned Confidence Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --burgundy: #3a0d0c;
      --gold: #cab84c;
      --cream: #faf8f4;
      --cream-dark: #f0ebe0;
      --ink: #1c1c1c;
      --ink-mid: #555;
      --ink-light: #999;
      --border: rgba(58,13,12,0.1);
      --ui-bg: #1a1a1a;
      --ui-border: rgba(255,255,255,0.08);
    }

    html, body {
      height: 100%;
      background: #111;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #fff;
      overflow: hidden;
    }

    /* TOP BAR */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: 52px;
      background: rgba(20,20,20,0.97);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--ui-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      gap: 1rem;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .topbar-logo {
      height: 26px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.7;
    }

    .topbar-divider {
      width: 0.5px;
      height: 20px;
      background: var(--ui-border);
    }

    .topbar-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-style: italic;
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
    }

    .topbar-center {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex: 1;
      justify-content: center;
    }

    .nav-btn {
      background: none;
      border: 0.5px solid var(--ui-border);
      color: rgba(255,255,255,0.6);
      width: 32px;
      height: 32px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }

    .nav-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.06);
      color: #fff;
      border-color: rgba(255,255,255,0.2);
    }

    .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    .page-indicator {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      font-weight: 300;
      min-width: 80px;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .page-input {
      background: rgba(255,255,255,0.06);
      border: 0.5px solid var(--ui-border);
      color: rgba(255,255,255,0.8);
      width: 44px;
      height: 28px;
      border-radius: 2px;
      text-align: center;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      outline: none;
      -moz-appearance: textfield;
    }

    .page-input::-webkit-outer-spin-button,
    .page-input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .page-input:focus { border-color: rgba(202,184,76,0.5); }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .zoom-btn {
      background: none;
      border: 0.5px solid var(--ui-border);
      color: rgba(255,255,255,0.5);
      padding: 0 10px;
      height: 28px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .zoom-btn:hover {
      background: rgba(255,255,255,0.06);
      color: #fff;
    }

    .sign-out-btn {
      background: none;
      border: 0.5px solid rgba(202,184,76,0.3);
      color: var(--gold);
      padding: 0 12px;
      height: 28px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      transition: all 0.15s;
      letter-spacing: 0.5px;
    }

    .sign-out-btn:hover {
      background: rgba(202,184,76,0.08);
    }

    /* MAIN READER */
    .reader {
      position: fixed;
      inset: 52px 0 52px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #111;
      cursor: grab;
    }

    .reader:active { cursor: grabbing; }

    .reader-inner {
      position: relative;
      transition: transform 0.15s ease;
      user-select: none;
      -webkit-user-select: none;
    }

    .page-canvas {
      display: block;
      box-shadow: 0 8px 48px rgba(0,0,0,0.6), 0 2px 12px rgba(0,0,0,0.4);
      border-radius: 1px;
      background: #fff;
    }

    /* No right-click */
    .reader-inner { pointer-events: all; }

    /* BOTTOM BAR */
    .bottombar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 52px;
      background: rgba(20,20,20,0.97);
      backdrop-filter: blur(12px);
      border-top: 0.5px solid var(--ui-border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .progress-track {
      width: 100%;
      max-width: 600px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
      margin: 0 2rem;
    }

    .progress-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      transition: width 0.2s ease;
      pointer-events: none;
    }

    .progress-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      transition: left 0.2s ease;
    }

    /* LOADING OVERLAY */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      z-index: 200;
      transition: opacity 0.4s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo {
      height: 40px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.6;
    }

    .loading-bar-wrap {
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .loading-text {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      font-weight: 300;
      letter-spacing: 1px;
    }

    /* KEYBOARD HINT */
    .key-hint {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.5px;
      pointer-events: none;
      animation: fadeOut 3s 2s ease forwards;
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    /* NO DOWNLOAD PROTECTION */
    img { -webkit-user-drag: none; user-drag: none; }

    @media (max-width: 768px) {
      .topbar-title { display: none; }
      .topbar-divider { display: none; }
      .zoom-btn span { display: none; }
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <img src="/tccg/logo.png" alt="TCCG" class="loading-logo"/>
  <div class="loading-bar-wrap">
    <div class="loading-bar" id="loadingBar"></div>
  </div>
  <p class="loading-text" id="loadingText">Loading your guide...</p>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <img src="/tccg/logo.png" alt="TCCG" class="topbar-logo"/>
    <div class="topbar-divider"></div>
    <span class="topbar-title">The Crowned Confidence Guide</span>
  </div>

  <div class="topbar-center">
    <button class="nav-btn" id="firstBtn" title="First page">«</button>
    <button class="nav-btn" id="prevBtn" title="Previous page">‹</button>
    <span class="page-indicator">
      <input class="page-input" type="number" id="pageInput" min="1" value="1"/>
      <span id="totalPages" style="color:rgba(255,255,255,0.3);margin-left:4px;">/ —</span>
    </span>
    <button class="nav-btn" id="nextBtn" title="Next page">›</button>
    <button class="nav-btn" id="lastBtn" title="Last page">»</button>
  </div>

  <div class="topbar-right">
    <button class="zoom-btn" id="zoomOut">− <span>Zoom</span></button>
    <button class="zoom-btn" id="zoomReset">100%</button>
    <button class="zoom-btn" id="zoomIn">+ <span>Zoom</span></button>
    <button class="sign-out-btn" id="signOutBtn">Sign out</button>
  </div>
</div>

<!-- READER -->
<div class="reader" id="reader">
  <div class="reader-inner" id="readerInner">
    <canvas class="page-canvas" id="pageCanvas"></canvas>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottombar">
  <div class="progress-track" id="progressTrack">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
    <div class="progress-thumb" id="progressThumb" style="left:0%"></div>
  </div>
</div>

<p class="key-hint">Use arrow keys or click the edges to navigate</p>

<!-- PDF.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  // Config
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'

  const PDF_URL = '/tccg/guide.pdf' // served via signed URL from your API
  const TOTAL_PAGES_FALLBACK = 72

  let pdfDoc = null
  let currentPage = 1
  let totalPages = 0
  let scale = 1.2
  let isRendering = false
  let renderQueue = null

  // DOM
  const canvas = document.getElementById('pageCanvas')
  const ctx = canvas.getContext('2d')
  const loadingOverlay = document.getElementById('loadingOverlay')
  const loadingBar = document.getElementById('loadingBar')
  const loadingText = document.getElementById('loadingText')
  const pageInput = document.getElementById('pageInput')
  const totalPagesEl = document.getElementById('totalPages')
  const progressFill = document.getElementById('progressFill')
  const progressThumb = document.getElementById('progressThumb')
  const readerInner = document.getElementById('readerInner')
  const reader = document.getElementById('reader')

  // Disable right click
  document.addEventListener('contextmenu', e => e.preventDefault())

  // Disable keyboard shortcuts for save/print
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && ['s','p','u'].includes(e.key.toLowerCase())) {
      e.preventDefault()
    }
  })

  // Load PDF
  async function loadPDF() {
    try {
      // Get a signed URL from your API first
      const res = await fetch('/api/reader/url', { credentials: 'include' })
      if (!res.ok) {
        window.location.href = '/tccg/login'
        return
      }
      const { url } = await res.json()

      loadingBar.style.width = '30%'
      loadingText.textContent = 'Preparing your guide...'

      const loadingTask = pdfjsLib.getDocument(url)

      loadingTask.onProgress = ({ loaded, total }) => {
        const pct = Math.min(30 + (loaded / total) * 60, 90)
        loadingBar.style.width = pct + '%'
      }

      pdfDoc = await loadingTask.promise
      totalPages = pdfDoc.numPages

      totalPagesEl.textContent = '/ ' + totalPages
      pageInput.max = totalPages

      loadingBar.style.width = '100%'
      loadingText.textContent = 'Ready'

      await renderPage(1)

      setTimeout(() => {
        loadingOverlay.classList.add('hidden')
      }, 400)

    } catch (err) {
      console.error(err)
      loadingText.textContent = 'Something went wrong. Please refresh.'
    }
  }

  // Render
  async function renderPage(num) {
    if (isRendering) {
      renderQueue = num
      return
    }

    isRendering = true

    const page = await pdfDoc.getPage(num)

    const readerRect = reader.getBoundingClientRect()
    const viewport = page.getViewport({ scale: 1 })

    // Auto fit to reader height with padding
    const fitScale = (readerRect.height - 40) / viewport.height
    const finalScale = fitScale * scale

    const scaledViewport = page.getViewport({ scale: finalScale })

    canvas.width = scaledViewport.width
    canvas.height = scaledViewport.height

    await page.render({ canvasContext: ctx, viewport: scaledViewport }).promise

    currentPage = num
    updateUI()

    isRendering = false

    if (renderQueue !== null) {
      const next = renderQueue
      renderQueue = null
      renderPage(next)
    }
  }

  function updateUI() {
    pageInput.value = currentPage
    const pct = ((currentPage - 1) / (totalPages - 1)) * 100
    progressFill.style.width = pct + '%'
    progressThumb.style.left = pct + '%'

    document.getElementById('prevBtn').disabled = currentPage <= 1
    document.getElementById('firstBtn').disabled = currentPage <= 1
    document.getElementById('nextBtn').disabled = currentPage >= totalPages
    document.getElementById('lastBtn').disabled = currentPage >= totalPages

    document.getElementById('zoomReset').textContent = Math.round(scale * 100) + '%'
  }

  function goTo(num) {
    const n = Math.max(1, Math.min(totalPages, num))
    if (n !== currentPage) renderPage(n)
  }

  // Controls
  document.getElementById('prevBtn').addEventListener('click', () => goTo(currentPage - 1))
  document.getElementById('nextBtn').addEventListener('click', () => goTo(currentPage + 1))
  document.getElementById('firstBtn').addEventListener('click', () => goTo(1))
  document.getElementById('lastBtn').addEventListener('click', () => goTo(totalPages))

  pageInput.addEventListener('change', () => goTo(parseInt(pageInput.value)))
  pageInput.addEventListener('keydown', e => { if (e.key === 'Enter') goTo(parseInt(pageInput.value)) })

  document.getElementById('zoomIn').addEventListener('click', () => {
    scale = Math.min(scale + 0.15, 2.5)
    renderPage(currentPage)
  })

  document.getElementById('zoomOut').addEventListener('click', () => {
    scale = Math.max(scale - 0.15, 0.5)
    renderPage(currentPage)
  })

  document.getElementById('zoomReset').addEventListener('click', () => {
    scale = 1.2
    renderPage(currentPage)
  })

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (document.activeElement === pageInput) return
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(currentPage + 1)
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(currentPage - 1)
    if (e.key === 'Home') goTo(1)
    if (e.key === 'End') goTo(totalPages)
  })

  // Click left/right edges to navigate
  reader.addEventListener('click', e => {
    const rect = reader.getBoundingClientRect()
    const x = e.clientX - rect.left
    if (x < rect.width * 0.25) goTo(currentPage - 1)
    else if (x > rect.width * 0.75) goTo(currentPage + 1)
  })

  // Progress bar scrubbing
  const progressTrack = document.getElementById('progressTrack')
  progressTrack.addEventListener('click', e => {
    const rect = progressTrack.getBoundingClientRect()
    const pct = (e.clientX - rect.left) / rect.width
    goTo(Math.round(1 + pct * (totalPages - 1)))
  })

  // Pan/drag
  let isDragging = false
  let dragStart = { x: 0, y: 0 }
  let translateX = 0
  let translateY = 0
  let startTranslate = { x: 0, y: 0 }

  reader.addEventListener('mousedown', e => {
    if (e.target === canvas || e.target === readerInner) {
      isDragging = true
      dragStart = { x: e.clientX, y: e.clientY }
      startTranslate = { x: translateX, y: translateY }
    }
  })

  document.addEventListener('mousemove', e => {
    if (!isDragging) return
    translateX = startTranslate.x + (e.clientX - dragStart.x)
    translateY = startTranslate.y + (e.clientY - dragStart.y)
    readerInner.style.transform = `translate(${translateX}px, ${translateY}px)`
  })

  document.addEventListener('mouseup', () => { isDragging = false })

  // Double click to reset position
  reader.addEventListener('dblclick', () => {
    translateX = 0
    translateY = 0
    readerInner.style.transform = 'translate(0, 0)'
  })

  // Sign out
  document.getElementById('signOutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' })
    window.location.href = '/tccg/login'
  })

  // Resize
  window.addEventListener('resize', () => {
    if (pdfDoc) renderPage(currentPage)
  })

  // Init
  loadPDF()
</script>
</body>
</html>
