<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Read — The Crowned Confidence Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --burgundy: #3a0d0c;
      --gold: #cab84c;
      --cream: #faf8f4;
      --ui-bg: rgba(20,20,20,0.97);
      --ui-border: rgba(255,255,255,0.08);
    }

    html {
      height: 100%;
    }
    body {
      height: 100%;
      min-height: 100vh;
      background: #111;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    /* TOP BAR */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 52px;
      background: var(--ui-bg);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--ui-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      gap: 1rem;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .topbar-logo {
      height: 26px;
      filter: brightness(0) invert(1);
      opacity: 0.7;
    }

    .topbar-divider {
      width: 0.5px;
      height: 20px;
      background: var(--ui-border);
    }

    .topbar-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-style: italic;
      font-weight: 300;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
    }

    .topbar-center {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex: 1;
      justify-content: center;
    }

    .nav-btn {
      background: none;
      border: 0.5px solid var(--ui-border);
      color: rgba(255,255,255,0.6);
      width: 32px;
      height: 32px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }

    .nav-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.06);
      color: #fff;
      border-color: rgba(255,255,255,0.2);
    }

    .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    .page-indicator {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      font-weight: 300;
      min-width: 80px;
      text-align: center;
    }

    .page-input {
      background: rgba(255,255,255,0.06);
      border: 0.5px solid var(--ui-border);
      color: rgba(255,255,255,0.8);
      width: 44px;
      height: 28px;
      border-radius: 2px;
      text-align: center;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      outline: none;
      -moz-appearance: textfield;
    }

    .page-input::-webkit-outer-spin-button,
    .page-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .page-input:focus { border-color: rgba(202,184,76,0.5); }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .icon-btn {
      background: none;
      border: 0.5px solid var(--ui-border);
      color: rgba(255,255,255,0.5);
      padding: 0 10px;
      height: 28px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .icon-btn:hover {
      background: rgba(255,255,255,0.06);
      color: #fff;
    }

    .icon-btn.active {
      border-color: rgba(202,184,76,0.5);
      color: var(--gold);
      background: rgba(202,184,76,0.06);
    }

    .sign-out-btn {
      background: none;
      border: 0.5px solid rgba(202,184,76,0.3);
      color: var(--gold);
      padding: 0 12px;
      height: 28px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }

    .sign-out-btn:hover { background: rgba(202,184,76,0.08); }

    /* READER STAGE */
    .stage {
      position: fixed;
      top: 52px; left: 0; right: 0; bottom: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #111;
      perspective: 1200px;
    }

    /* PAGE TURN WRAPPER */
    .spread-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      transform-style: preserve-3d;
    }

    .page-slot {
      position: relative;
      background: #fff;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5);
      overflow: hidden;
      flex-shrink: 0;
    }

    #leftSlot { box-shadow: -8px 8px 48px rgba(0,0,0,0.5); }
    #rightSlot { box-shadow: 8px 8px 48px rgba(0,0,0,0.5); }

    .page-slot canvas {
      display: block;
      user-select: none;
      -webkit-user-select: none;
    }

    
      100% { transform: rotateY(0deg); opacity: 1; }
    }

    /* BOTTOM BAR */
    .bottombar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 999;
      height: 52px;
      background: #1a1a1a;
      border-top: 0.5px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .progress-track {
      width: 100%;
      max-width: 600px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
      margin: 0 2rem;
    }

    .progress-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      transition: width 0.2s ease;
      pointer-events: none;
    }

    .progress-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 10px;
      height: 10px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      transition: left 0.2s ease;
    }

    /* LOADING */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      z-index: 200;
      transition: opacity 0.4s ease;
    }

    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .loading-logo {
      height: 40px;
      filter: brightness(0) invert(1);
      opacity: 0.6;
    }

    .loading-bar-wrap {
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .loading-bar {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .loading-text {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1px;
    }

    img { -webkit-user-drag: none; user-drag: none; }

    @media (max-width: 768px) {
      .topbar-title, .topbar-divider { display: none; }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <img src="/tccg/logo.png" alt="TCCG" class="loading-logo"/>
  <div class="loading-bar-wrap">
    <div class="loading-bar" id="loadingBar"></div>
  </div>
  <p class="loading-text" id="loadingText">loading your guide...</p>
  <p style="font-size:11px;color:rgba(255,255,255,0.25);font-weight:300;text-align:center;max-width:280px;line-height:1.7;margin-top:1rem;">best experienced on a laptop or tablet.<br/>image quality may be reduced on phones.</p>
  <p style="font-size:11px;color:rgba(255,255,255,0.25);font-weight:300;text-align:center;max-width:280px;line-height:1.7;margin-top:0.5rem;">use the zoom buttons at the<br/>bottom to zoom in — don't pinch.</p>
</div>

<div class="topbar">
  <div class="topbar-left">
    <img src="/tccg/logo.png" alt="TCCG" class="topbar-logo"/>
    <div class="topbar-divider"></div>
    <span class="topbar-title">The Crowned Confidence Guide</span>
  </div>

  <div class="topbar-center">
    <button class="nav-btn" id="firstBtn">«</button>
    <button class="nav-btn" id="prevBtn">‹</button>
    <span class="page-indicator">
      <input class="page-input" type="number" id="pageInput" min="1" value="1"/>
      <span id="totalPages" style="color:rgba(255,255,255,0.3);margin-left:4px;">/ —</span>
    </span>
    <button class="nav-btn" id="nextBtn">›</button>
    <button class="nav-btn" id="lastBtn">»</button>
  </div>

  <div class="topbar-right">
    <button class="icon-btn active" id="spreadToggle" title="Toggle spread view">⊞ spread</button>
    <button class="sign-out-btn" id="signOutBtn">sign out</button>
  </div>
</div>

<div class="stage" id="stage">
  <div class="spread-wrap" id="spreadWrap">
    <div class="page-slot" id="leftSlot"><canvas id="leftCanvas"></canvas></div>
    <div class="page-slot" id="rightSlot"><canvas id="rightCanvas"></canvas></div>
  </div>
</div>

<div style="position:fixed;bottom:0;left:0;right:0;z-index:999;height:52px;background:#1a1a1a;border-top:0.5px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;gap:0.75rem;">
  <button style="background:none;border:0.5px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);padding:0 12px;height:28px;border-radius:2px;cursor:pointer;font-size:15px;font-family:DM Sans,sans-serif;" id="zoomOut">−</button>
  <button style="background:none;border:0.5px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);padding:0 12px;height:28px;border-radius:2px;cursor:pointer;font-size:11px;font-family:DM Sans,sans-serif;min-width:48px;" id="zoomReset">100%</button>
  <button style="background:none;border:0.5px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);padding:0 12px;height:28px;border-radius:2px;cursor:pointer;font-size:15px;font-family:DM Sans,sans-serif;" id="zoomIn">+</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'

  let pdfDoc = null
  let currentPage = 1
  let totalPages = 0
  let scale = 0.85
  let spreadMode = true // two-page on by default
  let isAnimating = false

  const leftCanvas = document.getElementById('leftCanvas')
  const rightCanvas = document.getElementById('rightCanvas')
  const leftCtx = leftCanvas.getContext('2d')
  const rightCtx = rightCanvas.getContext('2d')
  const leftSlot = document.getElementById('leftSlot')
  const rightSlot = document.getElementById('rightSlot')
  const spreadWrap = document.getElementById('spreadWrap')
  const stage = document.getElementById('stage')

  // Disable right click and save shortcuts
  document.addEventListener('contextmenu', e => e.preventDefault())
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && ['s','p','u'].includes(e.key.toLowerCase())) e.preventDefault()
  })

  // In spread mode: page 1 is solo (cover), then 2-3, 4-5, etc.
  function getSpreadPages(page) {
    if (!spreadMode) return { left: page, right: null }
    if (page === 1) return { left: null, right: 1 } // cover alone on right
    // even pages start a spread
    const leftPage = page % 2 === 0 ? page : page - 1
    const rightPage = leftPage + 1
    return { left: leftPage, right: rightPage <= totalPages ? rightPage : null }
  }

  function getSpreadStart(page) {
    if (!spreadMode) return page
    if (page === 1) return 1
    return page % 2 === 0 ? page : page - 1
  }

  async function renderPageToCanvas(pageNum, canvas, ctx) {
    if (!pageNum || pageNum < 1 || pageNum > totalPages) {
      canvas.width = 0
      canvas.height = 0
      canvas.parentElement.style.display = 'none'
      return
    }
    canvas.parentElement.style.display = 'block'
    const page = await pdfDoc.getPage(pageNum)
    const stageRect = stage.getBoundingClientRect()
    const viewport = page.getViewport({ scale: 1 })
    const maxH = (stageRect.height - 40)
    const maxW = spreadMode ? (stageRect.width / 2 - 20) : (stageRect.width - 40)
    const fitScale = Math.min(maxH / viewport.height, maxW / viewport.width)
    const finalScale = fitScale * scale
    const scaledVP = page.getViewport({ scale: finalScale })
    canvas.width = scaledVP.width
    canvas.height = scaledVP.height
    await page.render({ canvasContext: ctx, viewport: scaledVP }).promise
  }

  async function renderSpread(page, direction) {
    if (isAnimating) return
    isAnimating = true

    const { left, right } = getSpreadPages(page)



    await Promise.all([
      renderPageToCanvas(left, leftCanvas, leftCtx),
      renderPageToCanvas(right, rightCanvas, rightCtx)
    ])

    if (!spreadMode) {
      leftSlot.style.display = 'none'
    }

    currentPage = page
    updateUI()



    isAnimating = false
  }

  function updateUI() {
    document.getElementById('pageInput').value = currentPage
    const pct = ((currentPage - 1) / Math.max(totalPages - 1, 1)) * 100
    document.getElementById('progressFill').style.width = pct + '%'
    document.getElementById('progressThumb').style.left = pct + '%'
    document.getElementById('prevBtn').disabled = currentPage <= 1
    document.getElementById('firstBtn').disabled = currentPage <= 1
    document.getElementById('nextBtn').disabled = spreadMode
      ? getSpreadPages(currentPage).right >= totalPages || (!getSpreadPages(currentPage).right && currentPage >= totalPages)
      : currentPage >= totalPages
    document.getElementById('lastBtn').disabled = currentPage >= totalPages
    document.getElementById('zoomReset').textContent = Math.round(scale * 100) + '%'
    document.getElementById('spreadToggle').classList.toggle('active', spreadMode)
    document.getElementById('spreadToggle').textContent = spreadMode ? '⊞ spread' : '▭ single'
  }

  function goNext() {
    if (isAnimating) return
    let next
    if (spreadMode) {
      const { right } = getSpreadPages(currentPage)
      next = right ? right + 1 : currentPage + 1
      if (next > totalPages) return
      next = getSpreadStart(next)
    } else {
      next = currentPage + 1
      if (next > totalPages) return
    }
    renderSpread(next, 'next')
  }

  function goPrev() {
    if (isAnimating) return
    let prev
    if (spreadMode) {
      const start = getSpreadStart(currentPage)
      prev = start <= 2 ? 1 : getSpreadStart(start - 1)
    } else {
      prev = currentPage - 1
      if (prev < 1) return
    }
    renderSpread(prev, 'prev')
  }

  function goTo(num) {
    const n = Math.max(1, Math.min(totalPages, num))
    const target = spreadMode ? getSpreadStart(n) : n
    const dir = target > currentPage ? 'next' : target < currentPage ? 'prev' : 'none'
    renderSpread(target, dir)
  }

  // Controls
  document.getElementById('prevBtn').addEventListener('click', goPrev)
  document.getElementById('nextBtn').addEventListener('click', goNext)
  document.getElementById('firstBtn').addEventListener('click', () => goTo(1))
  document.getElementById('lastBtn').addEventListener('click', () => goTo(totalPages))
  document.getElementById('pageInput').addEventListener('change', e => goTo(parseInt(e.target.value)))
  document.getElementById('pageInput').addEventListener('keydown', e => { if (e.key === 'Enter') goTo(parseInt(e.target.value)) })

  document.getElementById('zoomIn').addEventListener('click', () => { scale = Math.min(scale + 0.15, 2.5); renderSpread(currentPage, 'none') })
  document.getElementById('zoomOut').addEventListener('click', () => { scale = Math.max(scale - 0.15, 0.5); renderSpread(currentPage, 'none') })
  document.getElementById('zoomReset').addEventListener('click', () => { scale = 1.0; renderSpread(currentPage, 'none') })

  document.getElementById('spreadToggle').addEventListener('click', () => {
    spreadMode = !spreadMode
    leftSlot.style.display = spreadMode ? 'block' : 'none'
    renderSpread(currentPage, 'none')
  })

  document.addEventListener('keydown', e => {
    if (document.activeElement === document.getElementById('pageInput')) return
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goNext()
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goPrev()
    if (e.key === 'Home') goTo(1)
    if (e.key === 'End') goTo(totalPages)
  })

  // Click edges to navigate
  stage.addEventListener('click', e => {
    const rect = stage.getBoundingClientRect()
    const x = e.clientX - rect.left
    if (x < rect.width * 0.2) goPrev()
    else if (x > rect.width * 0.8) goNext()
  })

  // Sign out
  document.getElementById('signOutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' })
    window.location.href = '/tccg/login'
  })

  window.addEventListener('resize', () => { if (pdfDoc) renderSpread(currentPage, 'none') })

  // Load PDF
  async function loadPDF() {
    try {
      const res = await fetch('/api/reader/url', { credentials: 'include' })
      if (!res.ok) { window.location.href = '/tccg/login'; return }
      const { url } = await res.json()

      document.getElementById('loadingBar').style.width = '30%'
      document.getElementById('loadingText').textContent = 'preparing your guide...'

      const loadingTask = pdfjsLib.getDocument(url)
      loadingTask.onProgress = ({ loaded, total }) => {
        const pct = Math.min(30 + (loaded / total) * 60, 90)
        document.getElementById('loadingBar').style.width = pct + '%'
      }

      pdfDoc = await loadingTask.promise
      totalPages = pdfDoc.numPages
      document.getElementById('totalPages').textContent = '/ ' + totalPages
      document.getElementById('pageInput').max = totalPages

      document.getElementById('loadingBar').style.width = '100%'
      document.getElementById('loadingText').textContent = 'ready'

      await renderSpread(1, 'none')

      setTimeout(() => document.getElementById('loadingOverlay').classList.add('hidden'), 400)
    } catch (err) {
      console.error(err)
      document.getElementById('loadingText').textContent = 'something went wrong. please refresh.'
    }
  }

  loadPDF()
</script>
</body>
</html>
